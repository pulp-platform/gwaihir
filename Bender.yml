package:
  name: gwaihir
  authors:
    - "Tim Fischer <fischeti@iis.ee.ethz.ch>"
    - "Lorenzo Leone <lleone@iis.ee.ethz.ch>"

remotes:
  pulp: "https://github.com/pulp-platform"

dependencies:
  register_interface: "0.4.5"
  axi: "0.39.9"
  floo_noc: { git: "https://github.com/pulp-platform/FlooNoC.git", rev: "main"}
  apb: "0.2.4"
  common_cells: "1.39.0"
  snitch_cluster:     { git: "https://github.com/pulp-platform/snitch_cluster.git",     rev: "main"                                     }
  cheshire:           { git: "https://github.com/pulp-platform/cheshire.git",           rev: "main"                                     }
  obi:                { git: "https://github.com/pulp-platform/obi.git",                rev: "acfcd0f80c7539aa8da7821a66d9acf2074a5b4e" }
  apb_fll_if:         { git: "https://github.com/pulp-platform/apb_fll_if.git",         rev: "structs"                                  }
  axi_obi:            { path: "hw/axi_obi"                                                                                              }
  gwaihir-pd:       { path: "./pd"                                                                                                    }

workspace:
  package_links:
    .deps/snitch_cluster: snitch_cluster
    .deps/cheshire: cheshire

sources:
  # Source files grouped in levels. Files in level 0 have no dependencies on files in this
  # package. Files in level 1 only depend on files in level 0, files in level 2 on files in
  # levels 1 and 0, etc. Files within a level are ordered alphabetically.
  # Level 0
  - target: gw_gen_rtl
    files:
      # Level 0.0
      - .generated/floo_gwaihir_noc_pkg.sv
      - .generated/snitch_cluster_pkg.sv
      - .generated/gw_soc_regs_pkg.sv
      # Level 0.1
      - .generated/gw_soc_regs.sv
      - .generated/snitch_cluster_wrapper.sv

  # Level 1
  - hw/gwaihir_pkg.sv
  # Level 2
  - hw/cluster_tile.sv
  - hw/cheshire_tile.sv
  - hw/mem_tile.sv
  - hw/spm_tile.sv
  - hw/dummy_tile.sv

  # Level 3
  - hw/gwaihir_top.sv

  - target: any(simulation, test)
    include_dirs:
      - .generated
      - target/sim/include
    files:
      - target/sim/src/fixture_gwaihir_top.sv
      - target/sim/src/tb_gwaihir_top.sv


  - target: asic
    files:
    - pd/hw/gwaihir_chip.sv

  - target: all(any(simulation, test), asic)
    include_dirs:
      - .generated
      - pd/target/sim/include
      - target/sim/include
    files:
      - pd/target/sim/src/fixture_gwaihir_chip.sv
      - pd/target/sim/src/tb_gwaihir_chip.sv
      - pd/target/sim/src/tb_gwaihir_chip_config.sv
