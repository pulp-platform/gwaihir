name: gitlab-ci

on: [ push, pull_request, workflow_dispatch ]

jobs:
  gitlab-ci:
    name: Mirror and check
    runs-on: ubuntu-latest
    steps:
      - name: Check Gitlab CI
        uses: pulp-platform/pulp-actions/gitlab-ci@v2.5.0 # update version as needed, not autoupdated
        # Skip on forks or pull requests from forks due to missing secrets.
        if: github.repository == 'pulp-platform/gwaihir' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        with:
          domain: iis-git.ee.ethz.ch
          repo: github-mirror/gwaihir
          token: ${{ secrets.GITLAB_TOKEN }}
          # Poll every minute for 3 hours
          poll-period: 60
          poll-count: 180
